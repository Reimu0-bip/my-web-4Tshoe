<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4T Shoe Store — Đăng nhập</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="container-wide header-inner">
    <div class="logo" style="text-transform:uppercase"><a href="index.html" style="color:inherit;text-decoration:none">4T Shoe Store</a></div>
    <div class="header-icons" style="margin-left:auto">
      <button class="icon-btn">🔍</button>
      <button class="icon-btn">👤</button>
      <button class="icon-btn" onclick="location.href='cart.html'">🛍<span class="badge-count cart-badge">0</span></button>
    </div>
  </div>
</header>

<div class="auth-layout">
  <div class="auth-visual">👟</div>
  <div class="auth-panel">
    <h2>Đăng nhập tài khoản</h2>
    <p class="sub">Chào mừng bạn quay trở lại!</p>
    <form id="loginForm">
      <div class="form-group input-icon-wrap">
        <span class="field-icon">✉️</span>
        <input class="form-input" placeholder="Email hoặc số điện thoại" required>
      </div>
      <div class="form-group input-icon-wrap">
        <span class="field-icon">🔒</span>
        <input class="form-input" type="password" placeholder="Mật khẩu" required>
        <button type="button" class="toggle-eye">👁</button>
      </div>
      <div class="remember-row">
        <label class="flex items-center gap-8"><input type="checkbox"> Ghi nhớ đăng nhập</label>
        <a href="#">Quên mật khẩu?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-block">ĐĂNG NHẬP</button>
    </form>
    <div class="auth-divider">Hoặc đăng nhập với</div>
    <div class="social-row">
      <button class="social-btn">G Google</button>
      <button class="social-btn">f Facebook</button>
    </div>
    <p class="auth-foot">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
