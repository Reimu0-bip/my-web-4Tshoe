<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4T Shoe Store — Đăng ký</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="container-wide header-inner">
    <div class="logo" style="text-transform:uppercase"><a href="index.html" style="color:inherit;text-decoration:none">4T Shoe Store</a></div>
    <div class="header-icons" style="margin-left:auto">
      <button class="icon-btn">🔍</button>
      <button class="icon-btn">👤</button>
      <button class="icon-btn" onclick="location.href='cart.html'">🛍<span class="badge-count cart-badge">0</span></button>
    </div>
  </div>
</header>

<div class="auth-layout">
  <div class="auth-visual">👟</div>
  <div class="auth-panel">
    <h2>Đăng ký tài khoản</h2>
    <p class="sub">Tạo tài khoản để trải nghiệm mua sắm tốt hơn</p>
    <form id="registerForm">
      <div class="form-group input-icon-wrap">
        <span class="field-icon">👤</span>
        <input class="form-input" placeholder="Họ và tên" required>
      </div>
      <div class="form-group input-icon-wrap">
        <span class="field-icon">✉️</span>
        <input class="form-input" type="email" placeholder="Email" required>
      </div>
      <div class="form-group input-icon-wrap">
        <span class="field-icon">📱</span>
        <input class="form-input" placeholder="Số điện thoại" required>
      </div>
      <div class="form-group input-icon-wrap">
        <span class="field-icon">🔒</span>
        <input class="form-input" id="newPassword" type="password" placeholder="Mật khẩu" required>
        <button type="button" class="toggle-eye">👁</button>
      </div>
      <div class="strength-meter"><span></span><span></span><span></span><span></span></div>
      <p class="strength-label"></p>
      <div class="form-group input-icon-wrap" style="margin-top:14px">
        <span class="field-icon">🔒</span>
        <input class="form-input" id="confirmPassword" type="password" placeholder="Xác nhận mật khẩu" required>
        <button type="button" class="toggle-eye">👁</button>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px">ĐĂNG KÝ</button>
    </form>
    <p class="auth-foot">Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
